<!DOCTYPE html>
<html lang="en">
<head>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: sans-serif;
  }

  /* 1. Parent wrapper defines total scrollable area */
  .main-wrapper {
    height: 200vh; /* Creates long page for testing */
    background: #f0f0f0;
  }

  /* 2. Section that sticks to the top 70% of the screen */
  .sticky-section {
    position: sticky;
    top: 0;
    height: 70vh; /* 70% height */
    background: white;
    display: flex;
    flex-direction: column;
    border-bottom: 2px solid #ccc;
    box-sizing: border-box;
    overflow: hidden; /* Prevents scroll inside this, but we want scroll */
  }

  /* 3. The scrolling text container */
  .scrolling-text {
    flex: 1;
    overflow-y: auto; /* Allows scrolling inside */
    padding: 20px;
    background: #fafafa;
    border-bottom: 1px solid #eee;
  }

  /* 4. Bottom part (remaining 30% of sticky-section) */
  .bottom-part {
    height: 10vh; /* Remaining space in sticky area */
    background: #333;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Generic filler content for the rest of the page */
  .footer {
    height: 100vh;
    background: lightblue;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2em;
  }
</style>
</head>
<body>

<div class="main-wrapper">
  <div class="sticky-section">
    <div class="scrolling-text">
      <h2>Scrollable Text Area</h2>
      <p>Long text starts here...</p>
      <p style="height: 1000px;">
         ... (imagine a lot of text here) ...
      </p>
      <p>End of text.</p>
    </div>
    <div class="bottom-part">
      Fixed bottom part (stays while scrolling text)
    </div>
  </div>

  <div class="footer">
    Page continues here after text is done.
  </div>
</div>

</body>
</html>
